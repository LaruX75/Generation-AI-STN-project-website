backend:
  name: github
  repo: LaruX75/Generation-AI-STN-project-website
  branch: main
  base_url: https://sveltia-cms-auth.fc4ydtm5bs.workers.dev

local_backend: true
publish_mode: simple
media_folder: "media/wp-content/uploads"
public_folder: "/media/wp-content/uploads"
site_url: https://generation-ai-stn.fi
display_url: https://generation-ai-stn.fi
locale: "fi"

collections:
  # ── SUOMI ──────────────────────────────────────────────────────────────────
  - name: "posts_fi"
    label: "Postaukset (suomi)"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: "Ajankohtaista"
        field: categories
        pattern: "Ajankohtaista"
      - label: "Henkilöstö mediassa"
        field: categories
        pattern: "GenAI hankkeen henkilöstö mediassa"
      - label: "Henkilöstö tapahtumissa"
        field: categories
        pattern: "GenAI hankkeen henkilöstö tapahtumissa"
      - label: "Konferenssit ja seminaarit"
        field: categories
        pattern: "Konferenssit ja seminaarit"
      - label: "Hankkeen toiminta"
        field: categories
        pattern: "Hankkeen toiminta"
      - label: "Tutkimus"
        field: categories
        pattern: "Tutkimus"
      - label: "Webinaari"
        field: categories
        pattern: "Webinaari"
      - label: "Haastattelu"
        field: categories
        pattern: "Haastattelu"
    view_groups:
      - label: "Kategoria"
        field: categories
      - label: "Vuosi"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Päivämäärä", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss" }
      - { label: "Päivitetty", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Kieli", name: "lang", widget: "hidden", default: "fi" }
      - { label: "Tyyppi", name: "sourceType", widget: "hidden", default: "posts" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/post.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Lyhennelmä", name: "excerpt", widget: "text", required: false }
      - { label: "Kategoriat", name: "categories", widget: "list", required: false }
      - { label: "Avainsanat", name: "tags", widget: "list", required: false }
      - { label: "Kuva (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Kirjoittaja", name: "author", widget: "string", required: false, default: "admin" }
      - { label: "Sisältö", name: "body", widget: "markdown" }

  - name: "pages_fi"
    label: "Sivut (suomi)"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    sortable_fields: ["date", "title"]
    view_groups:
      - label: "Vuosi"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Päivämäärä", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Päivitetty", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Kieli", name: "lang", widget: "hidden", default: "fi" }
      - { label: "Tyyppi", name: "sourceType", widget: "hidden", default: "pages" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Lyhennelmä", name: "excerpt", widget: "text", required: false }
      - { label: "Kategoriat", name: "categories", widget: "list", required: false }
      - { label: "Avainsanat", name: "tags", widget: "list", required: false }
      - { label: "Kuva (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Sisältö", name: "body", widget: "markdown" }

  # ── ENGLISH ────────────────────────────────────────────────────────────────
  - name: "posts_en"
    label: "Posts (English)"
    folder: "content/en/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: "News"
        field: categories
        pattern: "News"
      - label: "Staff in media"
        field: categories
        pattern: "media"
      - label: "Staff at events"
        field: categories
        pattern: "events"
      - label: "Conferences"
        field: categories
        pattern: "Conferences"
      - label: "Research"
        field: categories
        pattern: "Research"
      - label: "Interview"
        field: categories
        pattern: "Interview"
      - label: "Webinar"
        field: categories
        pattern: "Webinar"
    view_groups:
      - label: "Category"
        field: categories
      - label: "Year"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss" }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Language", name: "lang", widget: "hidden", default: "en" }
      - { label: "Source type", name: "sourceType", widget: "hidden", default: "posts" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/post.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Categories", name: "categories", widget: "list", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured image (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false, default: "admin" }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "pages_en"
    label: "Pages (English)"
    folder: "content/en/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    sortable_fields: ["date", "title"]
    view_groups:
      - label: "Year"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Language", name: "lang", widget: "hidden", default: "en" }
      - { label: "Source type", name: "sourceType", widget: "hidden", default: "pages" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Categories", name: "categories", widget: "list", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured image (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Content", name: "body", widget: "markdown" }

  # ── SVENSKA ────────────────────────────────────────────────────────────────
