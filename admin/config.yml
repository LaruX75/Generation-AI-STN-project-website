backend:
  name: github
  repo: LaruX75/Generation-AI-STN-project-website
  branch: main
  base_url: https://sveltia-cms-auth.fc4ydtm5bs.workers.dev

local_backend: true
publish_mode: simple
media_folder: "media/wp-content/uploads"
public_folder: "/media/wp-content/uploads"
site_url: https://generation-ai-stn.fi
display_url: https://generation-ai-stn.fi
locale: "fi"

collections:
  # ── SUOMI ──────────────────────────────────────────────────────────────────
  - name: "posts_fi"
    label: "Postaukset (suomi)"
    label_singular: "Postaus (suomi)"
    icon: "edit_note"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: title
    summary: "{{date}} — {{title}}"
    preview_path: "{{permalink}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: "Mediassa"
        field: mainCategory
        pattern: "Mediassa"
      - label: "Tapahtumat"
        field: mainCategory
        pattern: "Tapahtumat"
      - label: "Toiminta"
        field: mainCategory
        pattern: "Toiminta"
      - label: "Tutkimus"
        field: mainCategory
        pattern: "Tutkimus"
    view_groups:
      - label: "Välilehti (ajankohtaista)"
        field: mainCategory
      - label: "Vuosi"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Päivämäärä", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss" }
      - { label: "Päivitetty", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Kieli", name: "lang", widget: "hidden", default: "fi" }
      - { label: "Tyyppi", name: "sourceType", widget: "hidden", default: "posts" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/post.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Lyhennelmä", name: "excerpt", widget: "text", required: false }
      - label: "Pääkategoria"
        name: "mainCategory"
        widget: "select"
        required: false
        options:
          - "Mediassa"
          - "Tapahtumat"
          - "Toiminta"
          - "Tutkimus"
      - label: "Tarkempi tyyppi"
        name: "subCategories"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Blogikirjoitus"
          - "GenAI hankkeen henkilöstö mediassa"
          - "GenAI hankkeen henkilöstö tapahtumissa"
          - "GenAI hankkeen kouluttamassa"
          - "Haastattelu"
          - "Julkaisu"
          - "Konferenssijulkaisu"
          - "Konferenssit ja seminaarit"
          - "Lasten oikeudet"
          - "Mielipidekirjoitus"
          - "Podcast"
          - "Webinaari"
          - "Työpaja"
          - "YLE"
      - label: "Muut kategoriat"
        name: "extraCategories"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Esiopetus"
          - "FCAI"
          - "Helsingin yliopisto"
          - "Heureka"
          - "Itä-Suomen yliopisto"
          - "Luokittelija"
          - "Sovellukset"
          - "Yliopistojen uutiset"
          - "Youtube"
      - { label: "Avainsanat", name: "tags", widget: "list", required: false }
      - { label: "Kuva (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Kirjoittaja", name: "author", widget: "string", required: false, default: "admin" }
      - { label: "Sisältö", name: "body", widget: "markdown", modes: ["rich_text", "raw"] }

  - name: "pages_fi"
    label: "Sivut (suomi)"
    label_singular: "Sivu (suomi)"
    icon: "article"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    identifier_field: title
    summary: "{{title}} — {{permalink}}"
    preview_path: "{{permalink}}"
    sortable_fields: ["date", "title"]
    view_groups:
      - label: "Vuosi"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Päivämäärä", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Päivitetty", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Kieli", name: "lang", widget: "hidden", default: "fi" }
      - { label: "Tyyppi", name: "sourceType", widget: "hidden", default: "pages" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Lyhennelmä", name: "excerpt", widget: "text", required: false }
      - { label: "Kategoriat", name: "categories", widget: "list", required: false }
      - { label: "Avainsanat", name: "tags", widget: "list", required: false }
      - { label: "Kuva (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Sisältö", name: "body", widget: "markdown", modes: ["rich_text", "raw"] }

  # ── ENGLISH ────────────────────────────────────────────────────────────────
  - name: "posts_en"
    label: "Posts (English)"
    label_singular: "Post (English)"
    icon: "edit_note"
    folder: "content/en/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: title
    summary: "{{date}} — {{title}}"
    preview_path: "{{permalink}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: "News from"
        field: mainCategory
        pattern: "News from"
      - label: "Research"
        field: mainCategory
        pattern: "Research"
      - label: "Staff in media"
        field: subCategories
        pattern: "media"
      - label: "Staff at events"
        field: subCategories
        pattern: "events"
      - label: "Webinar"
        field: subCategories
        pattern: "Webinar"
    view_groups:
      - label: "Main category"
        field: mainCategory
      - label: "Year"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss" }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Language", name: "lang", widget: "hidden", default: "en" }
      - { label: "Source type", name: "sourceType", widget: "hidden", default: "posts" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/post.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - label: "Main category"
        name: "mainCategory"
        widget: "select"
        required: false
        options:
          - "News from"
          - "Generation AI Monthly AI News (newsletter)"
          - "Media"
          - "Project activities"
          - "Research"
          - "University of Helsinki"
      - label: "Subcategories"
        name: "subCategories"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Blog post"
          - "GenAI project staff at events"
          - "GenAI project staff in the media"
          - "Opinion piece"
          - "Podcast"
          - "Webinar"
          - "YLE"
          - "Children's rights"
          - "Conference proceedings"
          - "Published on"
      - label: "Extra categories"
        name: "extraCategories"
        widget: "select"
        multiple: true
        required: false
        options:
          - "News from"
          - "Generation AI Monthly AI News (newsletter)"
          - "Media"
          - "Project activities"
          - "Research"
          - "University of Helsinki"
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured image (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false, default: "admin" }
      - { label: "Content", name: "body", widget: "markdown", modes: ["rich_text", "raw"] }

  - name: "pages_en"
    label: "Pages (English)"
    label_singular: "Page (English)"
    icon: "article"
    folder: "content/en/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    identifier_field: title
    summary: "{{title}} — {{permalink}}"
    preview_path: "{{permalink}}"
    sortable_fields: ["date", "title"]
    view_groups:
      - label: "Year"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Language", name: "lang", widget: "hidden", default: "en" }
      - { label: "Source type", name: "sourceType", widget: "hidden", default: "pages" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Categories", name: "categories", widget: "list", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured image (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Content", name: "body", widget: "markdown", modes: ["rich_text", "raw"] }

  # ── SVENSKA ────────────────────────────────────────────────────────────────
  - name: "posts_sv"
    label: "Inlägg (svenska)"
    label_singular: "Inlägg (svenska)"
    icon: "edit_note"
    folder: "content/sv/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: title
    summary: "{{date}} — {{title}}"
    preview_path: "{{permalink}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: "Nyheter från"
        field: mainCategory
        pattern: "Nyheter från"
      - label: "Forskning"
        field: mainCategory
        pattern: "Forskning"
      - label: "Personal i media"
        field: subCategories
        pattern: "personal i media"
      - label: "Personal vid evenemang"
        field: subCategories
        pattern: "evenemang"
      - label: "Webbinarium"
        field: subCategories
        pattern: "Webbinarium"
    view_groups:
      - label: "Huvudkategori"
        field: mainCategory
      - label: "År"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss" }
      - { label: "Uppdaterad", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Språk", name: "lang", widget: "hidden", default: "sv" }
      - { label: "Källtyp", name: "sourceType", widget: "hidden", default: "posts" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/post.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Utdrag", name: "excerpt", widget: "text", required: false }
      - label: "Huvudkategori"
        name: "mainCategory"
        widget: "select"
        required: false
        options:
          - "Nyheter från"
          - "Forskning"
          - "Generation AI Monthly AI News (nyhetsbrev)"
          - "Helsingfors universitet"
          - "Media"
          - "Projektaktiviteter"
      - label: "Underkategorier"
        name: "subCategories"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Blogginlägg"
          - "Debattartikel"
          - "GenAI-projektets personal i media"
          - "GenAI-projektets personal vid evenemang"
          - "Podcast"
          - "Webbinarium"
          - "YLE"
          - "Barns rättigheter"
          - "Konferenshandlingar"
          - "Publicerad på"
      - label: "Extra kategorier"
        name: "extraCategories"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Nyheter från"
          - "Forskning"
          - "Generation AI Monthly AI News (nyhetsbrev)"
          - "Helsingfors universitet"
          - "Media"
          - "Projektaktiviteter"
      - { label: "Taggar", name: "tags", widget: "list", required: false }
      - { label: "Bild (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Författare", name: "author", widget: "string", required: false, default: "admin" }
      - { label: "Innehåll", name: "body", widget: "markdown", modes: ["rich_text", "raw"] }

  # ── SIDOSRYHMÄTAPAHTUMAT ───────────────────────────────────────────────────
  - name: "stakeholder_activities"
    label: "Sidosryhmätapahtumat"
    label_singular: "Tapahtuma"
    icon: "groups"
    files:
      - name: "activities"
        label: "Tapahtumat ja esitykset"
        file: "src/_data/stakeholderActivities.data.json"
        fields:
          - label: "Tapahtumat"
            name: "items"
            widget: "list"
            summary: "{{fields.date}} — {{fields.stakeholder}}"
            fields:
              - { label: "Organisaatio / Tapahtuma", name: "stakeholder", widget: "string" }
              - { label: "Aihe / Otsikko", name: "title", widget: "string" }
              - { label: "Osallistujia", name: "participants", widget: "string", required: false, hint: "Luku tai N jos ei tiedossa" }
              - { label: "Päivämäärä", name: "date", widget: "string", required: false, hint: "Muodossa pp.kk.vvvv" }
              - { label: "Esittäjä(t)", name: "consortium", widget: "string", required: false, hint: "Hankkeen jäsenten lyhenteet, esim. MT, JL" }

  - name: "pages_sv"
    label: "Sidor (svenska)"
    label_singular: "Sida (svenska)"
    icon: "article"
    folder: "content/sv/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    identifier_field: title
    summary: "{{title}} — {{permalink}}"
    preview_path: "{{permalink}}"
    sortable_fields: ["date", "title"]
    view_groups:
      - label: "År"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Uppdaterad", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Språk", name: "lang", widget: "hidden", default: "sv" }
      - { label: "Källtyp", name: "sourceType", widget: "hidden", default: "pages" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Utdrag", name: "excerpt", widget: "text", required: false }
      - { label: "Kategorier", name: "categories", widget: "list", required: false }
      - { label: "Taggar", name: "tags", widget: "list", required: false }
      - { label: "Bild (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Innehåll", name: "body", widget: "markdown", modes: ["rich_text", "raw"] }
