    label: "Inlägg (svenska)"
    folder: "content/sv/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: "Aktuellt"
        field: categories
        pattern: "Aktuellt"
      - label: "Personal i media"
        field: categories
        pattern: "personal i media"
      - label: "Personal på evenemang"
        field: categories
        pattern: "evenemang"
      - label: "Konferenser"
        field: categories
        pattern: "Konferenser"
      - label: "Projektverksamhet"
        field: categories
        pattern: "Projektverksamhet"
      - label: "Intervju"
        field: categories
        pattern: "Intervju"
      - label: "Webbinarium"
        field: categories
        pattern: "Webbinarium"
    view_groups:
      - label: "Kategori"
        field: categories
      - label: "År"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss" }
      - { label: "Uppdaterad", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Språk", name: "lang", widget: "hidden", default: "sv" }
      - { label: "Källtyp", name: "sourceType", widget: "hidden", default: "posts" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/post.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Utdrag", name: "excerpt", widget: "text", required: false }
      - { label: "Kategorier", name: "categories", widget: "list", required: false }
      - { label: "Taggar", name: "tags", widget: "list", required: false }
      - { label: "Bild (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Författare", name: "author", widget: "string", required: false, default: "admin" }
      - { label: "Innehåll", name: "body", widget: "markdown" }

  - name: "pages_sv"
    label: "Sidor (svenska)"
    folder: "content/sv/pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    sortable_fields: ["date", "title"]
    view_groups:
      - label: "År"
        field: date
        pattern: "\\d{4}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Uppdaterad", name: "updated", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", required: false }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Språk", name: "lang", widget: "hidden", default: "sv" }
      - { label: "Källtyp", name: "sourceType", widget: "hidden", default: "pages" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.njk" }
      - { label: "Status", name: "status", widget: "hidden", default: "publish" }
      - { label: "Utdrag", name: "excerpt", widget: "text", required: false }
      - { label: "Kategorier", name: "categories", widget: "list", required: false }
      - { label: "Taggar", name: "tags", widget: "list", required: false }
      - { label: "Bild (URL)", name: "featuredImage", widget: "string", required: false }
      - { label: "Innehåll", name: "body", widget: "markdown" }
