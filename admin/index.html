<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sisällönhallinta — Generation AI</title>
  <style>
    #admin-navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
      background: #1a1a2e; height: 40px;
      display: flex; align-items: center; padding: 0 16px; gap: 0;
      font-family: system-ui, sans-serif; font-size: 13px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    #admin-navbar .nav-brand {
      color: #e2e8f0; font-weight: 600; margin-right: 20px; white-space: nowrap;
    }
    #admin-navbar a {
      color: #94a3b8; text-decoration: none;
      padding: 0 14px; height: 40px; display: flex; align-items: center;
    }
    #admin-navbar a:hover { color: #e2e8f0; background: rgba(255,255,255,0.07); }
    #admin-navbar a.active { color: #fff; border-bottom: 2px solid #60a5fa; }
    #admin-navbar .nav-spacer { flex: 1; }
    #admin-navbar .nav-logout {
      background: none; border: 1px solid #475569; color: #94a3b8;
      padding: 4px 12px; border-radius: 5px; cursor: pointer;
      font-size: 12px; font-family: inherit;
    }
    #admin-navbar .nav-logout:hover { border-color: #94a3b8; color: #e2e8f0; }
    /* Push Sveltia down */
    body { padding-top: 40px !important; }
  </style>
</head>
<body>
  <nav id="admin-navbar">
    <span class="nav-brand">Generation AI</span>
    <a href="/admin/" class="active">Sveltia CMS</a>
    <a href="/admin/categories.html">Kategoriatyökalu</a>
    <span class="nav-spacer"></span>
    <button class="nav-logout" onclick="adminLogout()">Kirjaudu ulos</button>
  </nav>
  <script>
    function adminLogout() {
      Object.keys(localStorage)
        .filter(k => k.startsWith("sveltia-cms"))
        .forEach(k => localStorage.removeItem(k));
      localStorage.removeItem("genai-cat-token");
      location.href = "/admin/";
    }
  </script>
  <!-- Sveltia CMS -->
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
